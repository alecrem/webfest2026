<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>わたしのページ</title>
  <script src="/widgets.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4ff;      /* ← 背景の色 */
      color: #1e293b;
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      color: #4355f9;           /* ← タイトルの色 */
      border-bottom: 4px solid #4355f9;
    }
    h2 { color: #334155; }
  </style>
</head>
<body>

  <h1>⭐ わたしのページ ⭐</h1>
  <p>ここに自己紹介を書こう！</p>

  <!-- 数字を 1〜151 に変えてみよう。一覧は /api/pokemon -->
  <poke-card src="/api/pokemon/25" color="#ffde00" title="お気に入りポケモン"></poke-card>

  <!-- 野球: /api/npb/teams ・ サッカー: /api/jleague/teams -->
  <team-card src="/api/npb/teams/tigers" title="応援しているチーム"></team-card>

  <!-- ?category=文化部 にするとどうなる？ -->
  <club-list src="/api/bukatsu?category=運動部" color="#16a34a" title="私の部活"></club-list>

</body>
</html>
